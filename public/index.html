<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SousChef — Your AI Cooking Companion</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #FFF7ED;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .container { max-width: 480px; }
    .logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #F97316, #FB923C);
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin-bottom: 24px;
    }
    h1 { font-size: 32px; font-weight: 700; margin-bottom: 12px; }
    p { color: #6b7280; font-size: 16px; line-height: 1.6; margin-bottom: 32px; }
    .links a {
      display: inline-block;
      margin: 0 8px;
      color: #F97316;
      font-weight: 600;
      text-decoration: none;
    }
    .links a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🍳</div>
    <h1>SousChef</h1>
    <p>Your AI-powered cooking companion. Import recipes, plan meals, and cook hands-free with voice guidance.</p>
    <div class="links">
      <a href="/delete-account">Delete Account</a>
      <a href="mailto:support@souschef.app">Contact</a>
    </div>
  </div>
</body>
</html>
